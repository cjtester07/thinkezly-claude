# FILE:    netlify.toml
# VERSION: v13
# UPDATED: 2026-06-09
# CHANGES: v13: Points to index-v13.html. Updated Gemini Live model to gemini-3.1-flash-live-preview.

[build]
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from   = "/.netlify/functions/*"
  to     = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from   = "/"
  to     = "/index-v13.html"
  status = 200
