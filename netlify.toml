# FILE:    netlify.toml
# VERSION: v14
# UPDATED: 2026-06-09
# CHANGES: v14: Points to index-v14.html. Removed TEXT modality — gemini-3.1-flash-live-preview supports AUDIO only.

[build]
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from   = "/.netlify/functions/*"
  to     = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from   = "/"
  to     = "/index-v14.html"
  status = 200
