# FILE:    netlify.toml
# VERSION: v17
# UPDATED: 2026-06-09
# CHANGES: v17: Points to index-v17.html. Replaced clientContent with realtimeInput.text for Gemini 3.1 live turns.

[build]
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from   = "/.netlify/functions/*"
  to     = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from   = "/"
  to     = "/index-v17.html"
  status = 200
