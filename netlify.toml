# FILE:    netlify.toml
# VERSION: v18
# UPDATED: 2026-06-09
# CHANGES: v18: Points to index-v18.html. clientContent for text turns; added transcription config to setup.

[build]
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from   = "/.netlify/functions/*"
  to     = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from   = "/"
  to     = "/index-v18.html"
  status = 200
