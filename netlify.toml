# FILE:    netlify.toml
# VERSION: v12
# UPDATED: 2026-06-08
# CHANGES: v12: Points to index-v12.html. Updated Gemini model name to gemini-2.5-flash-native-audio-latest.

[build]
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from   = "/.netlify/functions/*"
  to     = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from   = "/"
  to     = "/index-v12.html"
  status = 200
