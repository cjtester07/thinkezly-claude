# FILE:    netlify.toml
# VERSION: v20
# UPDATED: 2026-06-09
# CHANGES: v20: Points to index-v20.html. Gemini 3.1 native audio + removed transcript UI + WS keepalive.

[build]
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from   = "/.netlify/functions/*"
  to     = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from   = "/"
  to     = "/index-v20.html"
  status = 200
