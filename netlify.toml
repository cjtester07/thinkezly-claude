# FILE:    netlify.toml
# VERSION: v15
# UPDATED: 2026-06-09
# CHANGES: v15: Points to index-v15.html. Fixed deprecated realtimeInput.mediaChunks to realtimeInput.audio.

[build]
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from   = "/.netlify/functions/*"
  to     = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from   = "/"
  to     = "/index-v15.html"
  status = 200
