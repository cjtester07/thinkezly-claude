# FILE:    netlify.toml
# VERSION: v16
# UPDATED: 2026-06-09
# CHANGES: v16: Points to index-v16.html. Added initial greeting trigger; fixed onmessage for Gemini 3.1 multi-part events.

[build]
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from   = "/.netlify/functions/*"
  to     = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from   = "/"
  to     = "/index-v16.html"
  status = 200
