# FILE:    netlify.toml
# VERSION: v19
# UPDATED: 2026-06-09
# CHANGES: v19: Points to index-v19.html. Removed real-time transcript bubbles from voice agent UI.

[build]
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from   = "/.netlify/functions/*"
  to     = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from   = "/"
  to     = "/index-v19.html"
  status = 200
